  Receita Simples de Omelete Um prato fácil e rápido, perfeito para qualquer refeição. Esta omelete clássica combina ovos batidos cozidos na perfeição, opcionalmente recheados com queijo, vegetais ou carnes à sua escolha. Tempo de preparo Total: Aproximadamente 10 minutos Preparação: 5 minutos Cozimento: 5 minutos Ingredientes 2-3 ovos grandes Sal a gosto Pimenta a gosto 1 colher de sopa de manteiga ou óleo Recheios opcionais: queijo, legumes em cubos, carnes cozidas, ervas Instruções Bata o ovos: Numa tigela, bata os ovos com uma pitada de sal e pimenta até ficarem bem misturados. Você pode adicionar uma colher de sopa de água ou leite para obter uma textura mais fofa. Aqueça a panela: Coloque uma frigideira antiaderente em fogo médio e adicione manteiga ou óleo. Cozinhe a omelete: Assim que a manteiga derreter e borbulhar, coloque os ovos. Incline a frigideira para garantir que os ovos cubram uniformemente a superfície. Adicione recheios (opcional): Quando os ovos começarem a endurecer nas bordas, mas ainda estiverem um pouco escorrendo no meio, polvilhe os recheios escolhidos sobre metade da omelete. Dobre e sirva: Enquanto a omelete continua cozinhando, levante cuidadosamente uma das pontas e dobre-a sobre o recheio. Deixe cozinhar por mais um minuto e depois coloque-o em um prato. Aproveite: Sirva quente, com mais sal e pimenta se necessário. Nutrição A tabela abaixo mostra os valores nutricionais por porção sem recheios adicionais. Calorias 277kcal Carboidratos 0g Proteína 20g Gordura 22g
